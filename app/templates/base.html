<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAF-PT | Universidad Técnica de Manabí</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body, h1, h2, h3, h4, h5, h6 { font-family: 'Inter', sans-serif; }
        body { background-color: #f4f6f8; overflow-x: hidden; } 
        .utm-green { background-color: #19521b !important; color: white !important; }
        .glass-card { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.01); }
        .btn-main { transition: 0.3s; border-radius: 8px; font-weight: 600; text-decoration: none; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(46,125,50,0.3); }
    </style>
</head>
<body>
    <div class="w3-top" style="z-index: 1000;">
        <div class="w3-bar w3-white w3-padding w3-card" style="display: flex; align-items: center;">
            <a href="/" class="w3-bar-item w3-button w3-hover-none w3-hover-text-green w3-large" style="font-weight: 700;">
                <i class="fa-solid fa-graduation-cap w3-text-green"></i> SIAF<span class="w3-text-green">-PT</span>
            </a>
            <div class="w3-right w3-hide-small" style="margin-left: auto; display: flex; align-items: center;">
                {% if g.user %}
                    <a href="{{ url_for('main.dashboard') }}" class="w3-bar-item w3-button w3-round w3-hover-light-grey">
                        <i class="fa-solid fa-table-columns"></i> Panel de Control
                    </a>
                    <span class="w3-bar-item" style="color: #555; font-weight: 500; font-size: 14px;">
                        <i class="fa-solid fa-circle-user w3-text-green"></i> Hola, {{ g.user.nombre_completo.split()[0] }}
                    </span>
                    <a href="{{ url_for('main.logout') }}" class="w3-bar-item w3-button w3-round w3-hover-light-grey" style="color: #c62828;">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar Sesión
                    </a>
                {% else %}
                    <a href="{{ url_for('main.login') }}" class="w3-bar-item w3-button w3-round w3-hover-light-grey"><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</a>
                    <a href="{{ url_for('main.registro') }}" class="w3-bar-item w3-button utm-green btn-main w3-margin-left"><i class="fa-solid fa-user-plus"></i> Registrate ahora </a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="w3-content" style="max-width:1100px; margin-top: 60px;">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      // Esta función detecta cuando el navegador está listo para mover los cuadros
      document.addEventListener('DOMContentLoaded', function() {
          AOS.init({
              duration: 1000, // Tiempo del deslizamiento
              once: false,    // Que se repita al subir y bajar
              offset: 100,    // Distancia antes de activarse
              delay: 100      // Pequeño retraso para que se vea natural
          });
          
          // Forzar refresco por si el navegador se queda "dormido"
          window.addEventListener('load', AOS.refresh);
      });
    </script>
</body>
</html>
